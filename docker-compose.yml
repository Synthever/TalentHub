version: '3.8'

services:
  # PHP & Nginx Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: talenthub-app:latest
    container_name: talenthub_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=talenthub
      - DB_USERNAME=talenthub_user
      - DB_PASSWORD=secure_password_here
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    networks:
      - talenthub-network
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:80"

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: talenthub_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: talenthub
      MYSQL_ROOT_PASSWORD: root_password_here
      MYSQL_USER: talenthub_user
      MYSQL_PASSWORD: secure_password_here
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - talenthub-network
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: talenthub_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - talenthub-network
    ports:
      - "6379:6379"

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talenthub_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    networks:
      - talenthub-network
    depends_on:
      - mysql
      - redis
    command: php artisan queue:work --tries=3 --timeout=90

  # Scheduler (Cron)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talenthub_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
    networks:
      - talenthub-network
    depends_on:
      - mysql
      - redis
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60
      done"

networks:
  talenthub-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
